    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
      
      :root {
        --primary-gradient: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
      }

      /* NGĂN CHẶN REFRESH KHI KÉO XUỐNG (PULL-TO-REFRESH) */
      html, body {
        overscroll-behavior-y: none;
        overscroll-behavior-x: none;
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        /* Ngăn chặn các cử chỉ mặc định của trình duyệt như double-tap to zoom */
        touch-action: manipulation;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        letter-spacing: -0.01em;
        overflow: hidden; /* Body không cuộn, chúng ta cuộn ở container nội bộ */
      }

      * {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
      }

      .font-mono, .font-mono *, textarea, code, pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
      }

      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      @media print {
        header, nav, .no-print, .theme-toggle-button { display: none !important; }
        main { padding: 0 !important; margin: 0 !important; }
        .printable-area { box-shadow: none !important; border: none !important; width: 100% !important; }
      }

      /* Tối ưu cuộn trên Mobile */
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      
      .overflow-x-auto {
        -webkit-overflow-scrolling: touch;
      }

      /* Custom Scrollbar cho Laptop */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .dark ::-webkit-scrollbar-thumb { background: #334155; }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {

            borderRadius: {

      }

  <body class="bg-[#f8fafc] dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">
    <div id="root">
      <div class="flex items-center justify-center min-h-screen bg-white dark:bg-slate-950">
        <div class="relative">
          <div class="w-16 h-16 border-4 border-primary-200 border-t-primary-600 rounded-full animate-spin"></div>

    <script type="module" src="/index.tsx"></script>
    <script>
      // CHỐNG REFRESH KHI VUỐT XUỐNG TRÊN MOBILE (SCRIPT CẤP THẤP)
      let lastTouchY = 0;
      document.addEventListener('touchstart', function(e) {
          lastTouchY = e.touches[0].clientY;
      }, {passive: false});

      document.addEventListener('touchmove', function(e) {
          const touchY = e.touches[0].clientY;
          const touchTop = touchY > lastTouchY;
          
          // Nếu đang ở đỉnh trang và cố tình kéo xuống
          if (window.scrollY === 0 && touchTop) {
              // Kiểm tra xem có đang cuộn bên trong một phần tử con không
              const path = e.composedPath();
              let isInternalScroll = false;
              for (let i = 0; i < path.length; i++) {
                  const el = path[i];
                  if (el.scrollTop > 0) {
                      isInternalScroll = true;
                      break;
                  }
              }
              
              if (!isInternalScroll) {
                  e.preventDefault(); // Chặn hành vi pull-to-refresh
              }
          }
      }, {passive: false});
    </script>
  </body>
